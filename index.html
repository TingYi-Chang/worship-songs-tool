<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worship Practice</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>⛪ Worship Practice</h1>
        <p>Select a song to begin &nbsp;·&nbsp; <a href="admin.html" style="color:#7c6af7;text-decoration:none;font-size:11px">Manage songs</a></p>
        <div class="google-acct-section" id="google-acct-section">
          <!-- Filled by JS -->
        </div>
      </div>
      <div class="song-list" id="song-list"></div>
    </div>

    <!-- Main player -->
    <div class="main">
      <!-- Key info bar -->
      <div class="key-bar" id="key-bar" style="display:none">
        <span class="song-name" id="bar-title"></span>
        <div class="key-display">
          <div class="key-block">
            <div class="label">Original Key</div>
            <div class="value" id="bar-orig">—</div>
          </div>
          <div class="arrow">→</div>
          <div class="key-block">
            <div class="label">Target Key</div>
            <div class="value target" id="bar-target">—</div>
          </div>
          <div class="semitone-box">
            <div class="label">Shift</div>
            <div class="value" id="bar-semitones">0</div>
          </div>
        </div>
        <div class="ext-badge not-installed" id="ext-badge">
          <div class="dot"></div>
          <span id="ext-badge-text">Install extension for pitch shifting</span>
        </div>
      </div>

      <!-- Split: player + score -->
      <div class="content-split">
        <!-- YouTube player -->
        <div class="player-wrapper">
          <div class="player-placeholder" id="player-placeholder">
            <div class="icon">♪</div>
            <div>Select a song from the sidebar</div>
          </div>
          <div id="player-container" style="display:none;width:100%;height:100%">
            <div id="yt-player"></div>
          </div>
        </div>

        <!-- Score panel -->
        <div class="score-panel" id="score-panel">
          <div class="score-placeholder" id="score-placeholder">
            <div class="icon">♩</div>
            <div>No score available</div>
          </div>
          <iframe id="score-frame" class="score-frame" style="display:none" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>

      <!-- Speed bar -->
      <div class="speed-bar" id="speed-bar" style="display:none">
        <span class="label">Speed</span>
        <button class="speed-btn" data-rate="0.5" onclick="setSpeed(0.5)">0.5×</button>
        <button class="speed-btn" data-rate="0.75" onclick="setSpeed(0.75)">0.75×</button>
        <button class="speed-btn active" data-rate="1" onclick="setSpeed(1)">1×</button>
        <button class="speed-btn" data-rate="1.25" onclick="setSpeed(1.25)">1.25×</button>
      </div>
    </div>
  </div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
  <script>
    let ytPlayer = null;
    let currentSpeed = 1;
    let currentSongId = null;
    let pendingLoad = null;   // {song, semitones} waiting for extension ack
    let fallbackTimer = null; // fires if extension isn't installed

    // ── Google OAuth ───────────────────────────────────────────
    let googleUser = null; // { email, name, picture }

    function loadGoogleUser() {
      try { return JSON.parse(localStorage.getItem('worship_google_user')) || null; }
      catch { return null; }
    }
    function saveGoogleUser(u) {
      localStorage.setItem('worship_google_user', u ? JSON.stringify(u) : 'null');
    }
    function getClientId() {
      return localStorage.getItem('worship_google_client_id') || '';
    }
    function saveClientId(id) {
      localStorage.setItem('worship_google_client_id', id);
    }

    // Called by GIS after sign-in
    function handleGoogleCredential(response) {
      // Decode JWT payload (no verification needed — we're just reading the identity)
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      googleUser = { email: payload.email, name: payload.name, picture: payload.picture };
      saveGoogleUser(googleUser);
      renderGoogleSection();
    }

    function signOutGoogle() {
      googleUser = null;
      saveGoogleUser(null);
      renderGoogleSection();
    }

    // Rewrite Google URLs to use the signed-in account (authuser=email)
    function applyGoogleAccount(url) {
      if (!googleUser || !url) return url;
      try {
        const u = new URL(url);
        if (u.hostname.endsWith('.google.com')) {
          u.searchParams.set('authuser', googleUser.email);
        }
        return u.toString();
      } catch { return url; }
    }

    function initGoogleSignIn(clientId) {
      if (!clientId || typeof google === 'undefined') return;
      google.accounts.id.initialize({
        client_id: clientId,
        callback: handleGoogleCredential,
        auto_select: true,
      });
      // Render button into the sidebar section
      const btn = document.getElementById('gsi-btn');
      if (btn) {
        google.accounts.id.renderButton(btn, {
          theme: 'filled_black', size: 'medium', shape: 'pill', width: 200
        });
        google.accounts.id.prompt(); // show one-tap if available
      }
    }

    function renderGoogleSection() {
      const section = document.getElementById('google-acct-section');
      if (!section) return;
      if (googleUser) {
        section.innerHTML = `
          <div class="gacct-signed-in">
            <img src="${escHtml(googleUser.picture)}" class="gacct-avatar" alt="">
            <div class="gacct-info">
              <div class="gacct-name">${escHtml(googleUser.name)}</div>
              <div class="gacct-email">${escHtml(googleUser.email)}</div>
            </div>
            <button class="gacct-signout" onclick="signOutGoogle()">✕</button>
          </div>`;
      } else {
        const clientId = getClientId();
        section.innerHTML = `
          <div class="gacct-setup">
            ${!clientId ? `<input id="gsi-client-input" class="gsi-client-input" placeholder="Paste Google OAuth Client ID…">
            <button class="gacct-save-btn" onclick="saveClientIdAndInit()">Save</button>` : ''}
            <div id="gsi-btn" style="margin-top:6px"></div>
          </div>`;
        if (clientId) {
          // Wait for GIS to load then render button
          const tryInit = () => {
            if (typeof google !== 'undefined') initGoogleSignIn(clientId);
            else setTimeout(tryInit, 200);
          };
          tryInit();
        }
      }
    }

    function saveClientIdAndInit() {
      const val = document.getElementById('gsi-client-input')?.value.trim();
      if (!val) return;
      saveClientId(val);
      renderGoogleSection();
      const tryInit = () => {
        if (typeof google !== 'undefined') initGoogleSignIn(val);
        else setTimeout(tryInit, 200);
      };
      tryInit();
    }

    // ── Song list ──────────────────────────────────────────────
    function renderSidebar() {
      const songs = loadSongs();
      const list = document.getElementById('song-list');
      if (songs.length === 0) {
        list.innerHTML = `<div class="empty-state">No songs found.<br>Ask your worship leader to <a href="admin.html">add songs</a>.</div>`;
        return;
      }

      // Group songs by date
      const groups = {};
      songs.forEach(song => {
        const key = song.date || '';
        if (!groups[key]) groups[key] = [];
        groups[key].push(song);
      });

      // Sort groups: dated ones descending, undated at end
      const sortedKeys = Object.keys(groups).sort((a, b) => {
        if (!a) return 1;
        if (!b) return -1;
        return b.localeCompare(a);
      });

      function formatDate(dateStr) {
        if (!dateStr) return 'No Date';
        const [y, m, d] = dateStr.split('-');
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}, ${y}`;
      }

      list.innerHTML = sortedKeys.map(key => `
        <div class="date-group">
          <div class="date-header">${escHtml(formatDate(key))}</div>
          ${groups[key].map(song => `
            <div class="song-item ${song.id === currentSongId ? 'active' : ''}"
                 onclick="selectSong(${song.id})">
              <div class="song-title">${escHtml(song.title)}</div>
              <div class="key-badges">
                <span class="badge badge-orig">Orig: ${escHtml(song.originalKey)}</span>
                <span class="badge badge-target">→ ${escHtml(song.targetKey)}</span>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    // ── Song selection ─────────────────────────────────────────
    function selectSong(id) {
      const songs = loadSongs();
      const song = songs.find(s => s.id === id);
      if (!song) return;

      currentSongId = id;
      const semitones = getSemitones(song.originalKey, song.targetKey);

      // Update key bar
      document.getElementById('key-bar').style.display = 'flex';
      document.getElementById('speed-bar').style.display = 'flex';
      document.getElementById('bar-title').textContent = song.title;
      document.getElementById('bar-orig').textContent = song.originalKey;
      document.getElementById('bar-target').textContent = song.targetKey;
      document.getElementById('bar-semitones').textContent =
        semitones === 0 ? '0' : (semitones > 0 ? `+${semitones}` : `${semitones}`) + ' st';

      // Update score panel
      const scoreFrame = document.getElementById('score-frame');
      const scorePlaceholder = document.getElementById('score-placeholder');
      if (song.scoreUrl) {
        scoreFrame.src = applyGoogleAccount(song.scoreUrl);
        scoreFrame.style.display = 'block';
        scorePlaceholder.style.display = 'none';
      } else {
        scoreFrame.src = '';
        scoreFrame.style.display = 'none';
        scorePlaceholder.style.display = 'flex';
      }

      setBadge('waiting');
      renderSidebar();

      // Ask the content script to write semitones to chrome.storage (page JS can't do this).
      // content-worship.js will reply with 'worshipSemitonesReady', then we load the player.
      // A fallback timer loads the player directly if the extension isn't installed.
      pendingLoad = { song, semitones };
      clearTimeout(fallbackTimer);
      fallbackTimer = setTimeout(() => {
        if (pendingLoad) {
          const p = pendingLoad; pendingLoad = null;
          loadPlayer(p.song, p.semitones);
        }
      }, 400);
      window.postMessage({ type: 'worshipSetSemitones', semitones }, '*');
    }

    function loadPlayer(song, semitones) {
      const videoId = extractVideoId(song.youtubeUrl);
      if (!videoId) {
        alert('Could not parse the YouTube URL for this song.');
        return;
      }

      document.getElementById('player-placeholder').style.display = 'none';
      document.getElementById('player-container').style.display = 'block';
      currentSpeed = 1;
      updateSpeedButtons(1);

      if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
        ytPlayer.loadVideoById(videoId);
      } else {
        ytPlayer = new YT.Player('yt-player', {
          width: '100%',
          height: '100%',
          videoId: videoId,
          playerVars: {
            autoplay: 1,
            rel: 0,
            modestbranding: 1,
            origin: location.origin
          },
          events: {
            onReady: (e) => e.target.setPlaybackRate(currentSpeed)
          }
        });
      }

      // If no shift needed, confirm immediately
      if (semitones === 0) setBadge('no-shift');
    }

    // ── Extension badge ────────────────────────────────────────
    function setBadge(state) {
      const badge = document.getElementById('ext-badge');
      const text = document.getElementById('ext-badge-text');
      badge.className = `ext-badge ${state}`;
      const labels = {
        'not-installed': 'Install extension for pitch shifting',
        'waiting': 'Applying pitch...',
        'applied': 'Pitch Applied ✓',
        'no-shift': 'No shift needed'
      };
      text.textContent = labels[state] || '';
    }

    // Listen for messages from content-worship.js
    window.addEventListener('message', (e) => {
      if (!e.data) return;

      // Extension stored the semitones — safe to load the iframe now
      if (e.data.type === 'worshipSemitonesReady') {
        clearTimeout(fallbackTimer);
        if (pendingLoad) {
          const p = pendingLoad; pendingLoad = null;
          loadPlayer(p.song, p.semitones);
        }
      }

      // Extension confirmed pitch was applied
      if (e.data.type === 'worshipPitchApplied') {
        setBadge(e.data.semitones === 0 ? 'no-shift' : 'applied');
      }
    });

    // ── Speed control ──────────────────────────────────────────
    function setSpeed(rate) {
      currentSpeed = rate;
      updateSpeedButtons(rate);
      if (ytPlayer && typeof ytPlayer.setPlaybackRate === 'function') {
        ytPlayer.setPlaybackRate(rate);
      }
    }

    function updateSpeedButtons(rate) {
      document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.classList.toggle('active', parseFloat(btn.dataset.rate) === rate);
      });
    }

    // ── YouTube IFrame API callback ───────────────────────────
    function onYouTubeIframeAPIReady() {
      // Player is created on first song selection
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Init Google section on load
    googleUser = loadGoogleUser();
    renderGoogleSection();

    renderSidebar();
  </script>
</body>
</html>
